<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #5f9cff, #3ec6ff);
            font-family: 'Segoe UI', sans-serif;
        }

        .calculator {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 25px;
            width: 280px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .title {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .display {
            width: 100%;
            height: 60px;
            font-size: 26px;
            text-align: right;
            padding: 10px;
            border-radius: 15px;
            border: none;
            background: rgba(255,255,255,0.3);
            color: white;
            margin-bottom: 15px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            background: rgba(255,255,255,0.2);
        }

        button:hover {
            opacity: 0.8;
        }

        /* Special Colors */
        .red { background: #ff6b6b; }
        .blue { background: #4dabf7; }
        .orange { background: #ffa94d; }
        .green { background: #51cf66; }
    </style>
</head>

<body>

<div class="calculator">

    <div class="title">Calculate</div>

    <input type="text" id="display" class="display" value="{{ result }}" readonly>

    <form method="post">
        <input type="hidden" name="expression" id="expression">
    </form>

    <div class="buttons">
        <button class="red" onclick="clearDisplay()">C</button>
        <button onclick="appendValue('%')">%</button>
        <button onclick="appendValue('(')">(</button>
        <button onclick="appendValue(')')">)</button>

        <button class="blue" onclick="appendValue('7')">7</button>
        <button class="blue" onclick="appendValue('8')">8</button>
        <button class="blue" onclick="appendValue('9')">9</button>
        <button class="orange" onclick="appendValue('/')">÷</button>

        <button class="blue" onclick="appendValue('4')">4</button>
        <button class="blue" onclick="appendValue('5')">5</button>
        <button class="blue" onclick="appendValue('6')">6</button>
        <button class="orange" onclick="appendValue('*')">×</button>

        <button class="blue" onclick="appendValue('1')">1</button>
        <button class="blue" onclick="appendValue('2')">2</button>
        <button class="blue" onclick="appendValue('3')">3</button>
        <button class="orange" onclick="appendValue('-')">−</button>

        <button class="blue" onclick="appendValue('0')">0</button>
        <button class="blue" onclick="appendValue('.')">.</button>
        <button class="green" onclick="calculate()">=</button>
        <button class="orange" onclick="appendValue('+')">+</button>
    </div>

</div>

<script>
function appendValue(value) {
    document.getElementById("display").value += value;
}

function clearDisplay() {
    document.getElementById("display").value = "";
}

function calculate() {
    let exp = document.getElementById("display").value;
    document.getElementById("expression").value = exp;
    document.forms[0].submit();
}
</script>

</body>
</html>
